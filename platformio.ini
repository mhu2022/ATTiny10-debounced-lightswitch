[env:attiny10]
platform = atmelavr
; We gebruiken 'attiny13' als basis omdat deze fysiek lijkt op de AVR-structuur, 
; maar we overschrijven alles voor de attiny10
board = attiny13
board_build.mcu = attiny10
board_build.f_cpu = 1000000L

; Gebruik de stabiele toolchain (versie 5.4.0) die geen linker-bugs heeft
platform_packages =
    toolchain-atmelavr @ ~1.50400.0

; Zorg dat de linker weet dat het om avrtiny gaat
build_flags = -mmcu=attiny10
    -ffixed-r2

upload_flags = -P{serial.port} -b{upload.speed}
upload_port = COM10
upload_speed = 9600

monitor_port = COM10
monitor_speed = 9600
monitor_echo = yes
monitor_filters = send_on_enter
monitor_eol = CRLF